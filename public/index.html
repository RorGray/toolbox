<!doctype html>
<html lang="en" data-theme="modern">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Toolbox</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- apply the saved theme before first paint to avoid a flash -->
    <script>
      try {
        var t = localStorage.getItem('toolbox-theme');
        if (t === 'brass' || t === 'modern') document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Utility command bar (Workbench rail) -->
    <header class="bar">
      <div class="bar-row">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-name">TOOLBOX</span>
        </div>

        <label class="search" aria-label="Filter tools">
          <svg class="search-icon" viewBox="0 0 16 16" aria-hidden="true" width="14" height="14">
            <circle cx="7" cy="7" r="5" fill="none" stroke="currentColor" stroke-width="1.5" />
            <line x1="11" y1="11" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" />
          </svg>
          <input id="search" type="search" placeholder="Filter" autocomplete="off" />
        </label>

        <output id="readout" class="readout" aria-live="polite"></output>

        <div class="bar-actions">
          <button id="theme-toggle" class="btn ghost theme-toggle" type="button" title="Switch look">
            <span class="gear" aria-hidden="true">◑</span>
            <span class="theme-toggle-label">Brass</span>
          </button>
          <button id="refresh" class="btn ghost" hidden>Re-check</button>
          <button id="add" class="btn solid" hidden>Add tool</button>
        </div>
      </div>
    </header>

    <main id="board" class="board" aria-live="polite">
      <p class="placeholder">Loading tools…</p>
    </main>

    <footer id="colophon" class="colophon" hidden></footer>

    <!-- Add / edit dialog -->
    <dialog id="editor" class="editor">
      <form id="editor-form" method="dialog">
        <h2 id="editor-title">Add tool</h2>

        <label class="field">
          <span>Name</span>
          <input name="name" required maxlength="80" placeholder="PDF Editor" />
        </label>

        <label class="field">
          <span>URL</span>
          <input name="url" type="url" required placeholder="https://pdf.tools.example.com" />
        </label>

        <div class="field-row">
          <label class="field">
            <span>Category</span>
            <input name="category" list="categories" placeholder="Documents" />
          </label>
          <label class="field">
            <span>Tags <em>comma separated</em></span>
            <input name="tags" placeholder="pdf, convert" />
          </label>
        </div>
        <datalist id="categories"></datalist>

        <label class="field">
          <span>Description</span>
          <input name="description" maxlength="160" placeholder="Merge, split and sign PDFs" />
        </label>

        <fieldset class="field icon-field">
          <legend>Icon</legend>
          <div class="icon-modes">
            <label><input type="radio" name="iconMode" value="auto" checked /> Auto-fetch favicon</label>
            <label><input type="radio" name="iconMode" value="url" /> Paste image URL</label>
            <label><input type="radio" name="iconMode" value="upload" /> Upload file</label>
            <label class="keep-only" hidden><input type="radio" name="iconMode" value="keep" /> Keep current</label>
            <label><input type="radio" name="iconMode" value="none" /> None (monogram)</label>
          </div>
          <input class="icon-url" name="iconUrl" type="url" placeholder="https://…/icon.png" hidden />
          <input class="icon-file" name="iconFile" type="file" accept="image/*" hidden />
          <p class="hint">
            Auto-fetch is best-effort — tools behind Authentik usually return a
            login page instead of an icon, so paste or upload if it comes up blank.
          </p>
        </fieldset>

        <p id="editor-error" class="form-error" hidden></p>

        <div class="editor-actions">
          <button type="button" id="editor-cancel" class="btn ghost">Cancel</button>
          <button type="submit" id="editor-save" class="btn solid">Save</button>
        </div>
      </form>
    </dialog>

    <script src="/app.js" type="module"></script>
  </body>
</html>
